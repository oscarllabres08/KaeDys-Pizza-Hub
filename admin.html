<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Not Found</title>
    <meta name="robots" content="noindex" />
  </head>
  <body style="margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:#0b0b0b;color:#f5f5f5;">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
      <div style="max-width:520px;width:100%;background:#111;border:1px solid rgba(234,179,8,.35);border-radius:16px;padding:24px;text-align:center;">
        <h1 style="margin:0 0 8px;font-size:22px;color:#facc15;">Page not found</h1>
        <p style="margin:0 0 18px;color:#cbd5e1;font-size:14px;line-height:1.5;">
          This URL is not used. Please go to the main site.
        </p>
        <a href="/" style="display:inline-block;padding:10px 14px;border-radius:10px;background:#facc15;color:#000;text-decoration:none;font-weight:700;">
          Go to main site
        </a>
      </div>
    </div>
  </body>
</html>
